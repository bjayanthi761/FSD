<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Add Event</h2>

<form action="/save" method="post">

    <input type="text" name="name" placeholder="Event Name" class="form-control mb-2" required>

    <input type="text" name="department" placeholder="Department" class="form-control mb-2" required>

    <input type="text" name="type" placeholder="Type" class="form-control mb-2" required>

    <input type="text" name="date" placeholder="Date" class="form-control mb-2" required>

    <textarea name="description" placeholder="Description" class="form-control mb-2"></textarea>

    <button type="submit" class="btn btn-success">Save</button>
</form>

</body>
</html>
