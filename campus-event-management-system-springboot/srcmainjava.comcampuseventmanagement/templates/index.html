<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Campus Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="mb-3">Campus Events</h2>

<a href="/login" class="btn btn-primary">Login</a>
<a href="/new" class="btn btn-success">Add Event</a>

<table class="table table-bordered mt-3">
    <tr>
        <th>Name</th>
        <th>Dept</th>
        <th>Type</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    <tr th:each="e : ${events}">
        <td th:text="${e.name}"></td>
        <td th:text="${e.department}"></td>
        <td th:text="${e.type}"></td>
        <td th:text="${e.date}"></td>

        <td>
            <a th:href="@{/delete/{id}(id=${e.id})}" class="btn btn-danger btn-sm">Delete</a>
            <a th:href="@{/register/{id}(id=${e.id})}" class="btn btn-success btn-sm">Register</a>
            <a th:href="@{/registrations/{id}(id=${e.id})}" class="btn btn-info btn-sm">View</a>
        </td>
    </tr>
</table>

</body>
</html>
